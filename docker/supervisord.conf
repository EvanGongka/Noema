[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:postgres]
command=/usr/lib/postgresql/16/bin/postgres -D %(ENV_PGDATA)s -c listen_addresses=127.0.0.1
user=postgres
priority=10
autorestart=true
stopsignal=INT
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:redis]
command=/usr/bin/redis-server --bind 127.0.0.1 --protected-mode yes --appendonly yes --dir /data/redis --logfile ""
user=redis
priority=10
autorestart=true
stopsignal=TERM
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:api]
command=/usr/local/bin/node /opt/ainote/server/dist/main.js
directory=/opt/ainote/server
user=ainote
priority=20
autorestart=true
stopsignal=TERM
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:worker]
command=/bin/sh -c 'if [ "${ENABLE_AI_WORKER:-false}" = "true" ]; then exec /usr/local/bin/node /opt/ainote/worker/dist/main.js; else exec /bin/sleep infinity; fi'
directory=/opt/ainote/worker
user=ainote
priority=20
autorestart=true
stopsignal=TERM
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:web]
command=/usr/local/bin/node /opt/ainote/web/apps/web/server.js
directory=/opt/ainote/web
user=ainote
environment=PORT="3000",HOSTNAME="0.0.0.0",NODE_ENV="production"
priority=20
autorestart=true
stopsignal=TERM
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
