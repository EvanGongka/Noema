name: 持续集成

on:
  push:
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.8
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm check
